      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Instrument+Sans:wght@400;450;500;600;650&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"

    />

    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function (OneSignal) {
        await OneSignal.init({
          appId: "6b1caa76-8b69-48cb-b925-b10aabd80ef3",
          serviceWorkerParam: { scope: "/" },
          serviceWorkerPath: "OneSignalSDKWorker.js",
        });
      });
    </script>
    <link rel="stylesheet" href="./styles.css?v=20260527d" />

  <body data-page="exam">
    <!-- APP SHELL: A stripped study view for exam week. -->
    <div class="app-shell">
      <!-- SIDEBAR COMPONENT: Same student navigation, with Exam Mode highlighted. -->
      <aside class="sidebar" aria-label="Class dashboard navigation">
        <a class="sidebar-brand" href="./dashboard.html">
          <img src="./assets/ui-logo.jpeg" alt="University of Ibadan logo" />
          <span>
            <strong>PhysioK29</strong>
            <small>Physiology 2k29</small>
          </span>
        </a>

        <nav class="nav-stack" aria-label="Primary pages">
          <a class="nav-link" href="./dashboard.html"><span class="material-symbols-rounded" aria-hidden="true">space_dashboard</span>Dashboard</a>
          <a class="nav-link" href="./courses.html"><span class="material-symbols-rounded" aria-hidden="true">menu_book</span>Courses</a>
          <a class="nav-link active" href="./exam.html"><span class="material-symbols-rounded" aria-hidden="true">timer</span>Exam Mode</a>
          <a class="nav-link" href="./timetable.html"><span class="material-symbols-rounded" aria-hidden="true">calendar_month</span>Timetable</a>
          <a class="nav-link" href="./reps.html"><span class="material-symbols-rounded" aria-hidden="true">groups</span>Reps</a>
          <a class="nav-link" href="./suggestions.html"><span class="material-symbols-rounded" aria-hidden="true">forum</span>Suggestions</a>
        </nav>
      </aside>

      <main class="main-area">
        <!-- HEADER COMPONENT: Keeps class identity visible without extra dashboard noise. -->
        <header class="page-header">
          <div class="logo-plaque">
            <img src="./assets/ui-logo.jpeg" alt="University of Ibadan logo" />
            <div class="plaque-text">
              <span>PhysioK29</span>
              <strong>Exam Mode</strong>
            </div>
          </div>
          <a class="ghost-action" href="./courses.html">
            <span class="material-symbols-rounded" aria-hidden="true">menu_book</span>
            All courses
          </a>
        </header>

        <!-- COUNTDOWN COMPONENT: Only the nearest relevant CBT row is promoted. -->
        <section class="ges-countdown-panel exam-countdown-panel" aria-label="Exam countdown">
          <div>
            <p class="eyebrow">Next CBT countdown</p>
            <h1 id="examCountdownTitle">Loading exam...</h1>
            <p id="examCountdownMeta">Checking timetable rows...</p>
          </div>
          <div class="countdown-grid" id="examCountdownGrid" aria-label="Time remaining"></div>
        </section>

        <!-- LAST-MINUTE RESOURCE COMPONENT: Shows only revision-friendly files. -->
        <section class="content-panel">
          <div class="section-header">
            <div>
              <p class="eyebrow">Last-minute resources</p>
              <h2>Practice and revision picks</h2>
            </div>
          </div>
          <div id="examResourceGrid" class="resource-grid"></div>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js?v=20260527d"></script>
