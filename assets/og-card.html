<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        place-items: center;
        width: 1200px;
        height: 630px;
        margin: 0;
        overflow: hidden;
        background:
          linear-gradient(135deg, #131817 0%, #171b1f 42%, #26302d 100%);
        color: #fffaf0;
        font-family: Inter, "Segoe UI", Arial, sans-serif;
      }

      .card {
        position: relative;
        display: grid;
        grid-template-columns: 190px 1fr;
        gap: 42px;
        width: 1060px;
        min-height: 430px;
        border: 1px solid rgba(255, 250, 240, 0.18);
        border-radius: 36px;
        background: rgba(255, 253, 248, 0.08);
        padding: 54px;
        box-shadow: 0 32px 90px rgba(0, 0, 0, 0.28);
      }

      .logo-wrap {
        display: grid;
        place-items: center;
        align-self: start;
        width: 190px;
        height: 190px;
        border-radius: 34px;
        background: #fffdf8;
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.24);
      }

      .logo-wrap img {
        width: 150px;
        height: 150px;
        object-fit: contain;
      }

      .eyebrow {
        margin: 0 0 18px;
        color: #9ee2cd;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        max-width: 720px;
        color: #fffaf0;
        font-size: 86px;
        font-weight: 760;
        letter-spacing: 0;
        line-height: 0.98;
      }

      p {
        max-width: 760px;
        margin: 28px 0 0;
        color: rgba(255, 250, 240, 0.78);
        font-size: 31px;
        line-height: 1.28;
      }

      .tag {
        position: absolute;
        right: 54px;
        bottom: 46px;
        border-radius: 999px;
        background: #fffdf8;
        color: #16735c;
        padding: 14px 24px;
        font-size: 25px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="logo-wrap">
        <img src="./ui-logo.jpeg" alt="" />
      </div>
      <section>
        <p class="eyebrow">Physiology Class 2k29</p>
        <h1>PhysioK29</h1>
        <p>Slides, class announcements, CBT timetable, rep contacts, and suggestions in one calm portal.</p>
      </section>
      <div class="tag">k29.rep / k29.admin</div>
    </main>
  </body>
</html>
