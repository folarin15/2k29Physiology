<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        place-items: center;
        width: 512px;
        height: 512px;
        margin: 0;
        overflow: hidden;
        background: #171b1f;
        font-family: Inter, "Segoe UI", Arial, sans-serif;
      }

      .tile {
        display: grid;
        place-items: center;
        width: 448px;
        height: 448px;
        border-radius: 108px;
        background: linear-gradient(145deg, #fffdf8 0%, #e7f7f1 100%);
        box-shadow: inset 0 0 0 12px rgba(42, 157, 127, 0.14);
      }

      img {
        width: 210px;
        height: 210px;
        object-fit: contain;
      }

      strong {
        margin-top: 10px;
        color: #16735c;
        font-size: 86px;
        letter-spacing: -2px;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <div class="tile">
      <img src="./ui-logo.jpeg" alt="" />
      <strong>K29</strong>
    </div>
  </body>
</html>
